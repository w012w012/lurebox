include: package:very_good_analysis/analysis_options.yaml

analyzer:
  errors:
    # 允许 print / debugPrint 用于开发阶段调试
    avoid_print: ignore
    # 项目使用 Riverpod，不需要 document_all_public_api
    public_member_api_docs: ignore

linter:
  rules:
    # 允许单文件内非 const 构造（部分 widget 无法 const）
    prefer_const_constructors: false
    # 项目偏好单引号，但双引号包含插值时保留
    prefer_single_quotes: true
