name: lurebox
description: "路亚鱼护 - 钓鱼爱好者的鱼获记录工具"
publish_to: 'none'
version: 1.0.4+4

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 本地数据库
  sqflite: ^2.4.2

  # 状态管理
  flutter_riverpod: ^2.6.1

  # 相机
  camera: ^0.11.4
  image_picker: ^1.1.2

  # 地理位置
  geolocator: ^12.0.0
  geocoding: ^2.2.2

  # 分享
  share_plus: ^10.0.0

  # 图表统计
  fl_chart: ^0.70.0

  # 工具库
  path_provider: ^2.1.1
  path: ^1.9.0
  intl: ^0.20.2
  permission_handler: ^12.0.1
  package_info_plus: ^9.0.0
  image: ^4.1.3
  file_picker: ^8.0.5
  shimmer: ^3.0.0
  http: ^1.1.0

  # 路由
  go_router: ^14.8.1

  # 天气 API
  open_meteo: ^3.0.0

  # 备份功能
  archive: ^3.6.1
  crypto: ^3.0.3

  # 安全存储
  flutter_secure_storage: ^9.2.2

  # 导出功能
  csv: ^5.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  sqflite_common_ffi: ^2.3.4
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

# iOS deployment target is configured in ios/Podfile