name: lurebox
description: "路亚鱼护 - 钓鱼爱好者的鱼获记录工具"
publish_to: 'none'
version: 1.0.3+3

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 本地数据库
  sqflite: ^2.3.0

  # 状态管理
  flutter_riverpod: ^2.4.9

  # 相机
  camera: ^0.10.5+9
  image_picker: ^1.0.7

  # 地理位置
  geolocator: 10.0.0
  geocoding: ^2.1.1

  # 地图
  flutter_map: ^6.0.0
  latlong2: ^0.9.0
  url_launcher: ^6.2.1

  # 分享
  share_plus: ^7.2.1

  # 图表统计
  fl_chart: ^0.66.0

  # 工具库
  path_provider: ^2.1.1
  path: ^1.9.0
  intl: ^0.19.0
  uuid: ^4.2.1
  permission_handler: ^11.1.0
  package_info_plus: ^9.0.0
  image: ^4.1.3
  file_picker: 8.0.5
  shimmer: ^3.0.0
  http: ^1.1.0

  # 天气 API
  open_meteo: ^3.0.0

  # 备份功能
  archive: ^3.6.0
  crypto: ^3.0.3

  # 导出功能
  csv: ^5.1.1
  pdf: ^3.10.4
  printing: ^5.11.1
  screenshot: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  sqflite_common_ffi: ^2.3.0
  mocktail: ^1.0.1

flutter:
  uses-material-design: true

# iOS deployment target is configured in ios/Podfile